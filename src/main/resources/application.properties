spring.application.name=chatApp

# ========================
# DataSource (MySQL)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/livechat_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT
# ========================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ========================
# File Upload
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=./uploads

# ========================
# CORS
# ========================
cors.allowed-origins=http://localhost:5173

# ========================
# Actuator
# ========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ========================
# Logging
# ========================
logging.level.com.example.chatApp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=DEBUG
